name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    # Rubicon is a Windows-only desktop app (WMI launcher, PowerShell toasts,
    # Edge PWA) — several server tests assert Windows path shapes, so CI runs
    # on the platform the app actually targets.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
